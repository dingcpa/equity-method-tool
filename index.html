function numInput(value, attrs) {
  const negCls = (Number(value) < 0) ? ' numeric-neg' : '';
  return `<input type="text" inputmode="decimal" class="numeric${negCls}" value="${fmtInput(value)}" ${attrs}>`;
}

function renderBasicInfo(co) {
  const type = co.type || 'EQUITY';
  const meta = TYPE_META[type] || TYPE_META.EQUITY;
  const fm = formMeta(co.company_form);
  const isLimited = (co.company_form === 'LIMITED');
  const showOCI = (type === 'EQUITY' || type === 'FVOCI');
  const bvHint = type === 'EQUITY' ? '上年度底稿期末長投帳面值'
              : type === 'FVPL' ? '上年度底稿期末公允價值（拋轉自動帶入）'
              : type === 'FVOCI' ? '上年度底稿期末公允價值（拋轉自動帶入）'
              : '上年度底稿期末成本帳面值（拋轉自動帶入）';
  const ociHint = type === 'EQUITY' ? '上年度底稿期末 OCI 餘額（含正負號）'
                : '上年度底稿期末 FVOCI 累計評價損益（含正負號）';
  const totalHint = isLimited
    ? '被投資公司之總資本額（元）；商工登記公示資料。<u>若本年新設立，填設立後總資本（不必為 0）</u>'
    : '已發行股數（含庫藏股）；商工登記公示資料 / 子公司去年期末股本 ÷ 面額。<u>若本年新設立，填設立後總股數</u>';
  const outstandingHint = isLimited
    ? '有限公司無庫藏股概念，通常等於總資本額（元）'
    : '＝ 總發行 − 庫藏股；無庫藏股可直接填等於總發行（持股 % 計算分母）';
  return `
  <div class="sec" id="in_basic">
    <h2 class="sec-title">一、基本資料 / 期初承轉</h2>
    <div class="grid">
      <div class="label">被投資公司名稱</div>
      <div class="input-cell"><input type="text" data-co="name" value="${co.name}" style="text-align:left"></div>
      <div class="hint">同步顯示於左側清單與所有年度</div>

      <div class="label">投資類型</div>
      <div class="calc"><span class="pill ${meta.pill}">${meta.short}</span> ${meta.label}</div>
      <div class="hint">建立時決定，無法事後修改（避免破壞歷年資料）</div>

      <div class="label">公司形態</div>
      <div class="calc"><span class="pill ${isLimited ? 'y' : 'b'}">${fm.short}</span> ${fm.label}</div>
      <div class="hint">${isLimited ? '有限公司：以「出資額（元）」計量；無股票、無庫藏股' : '股份有限公司：以「股數」計量；面額 10 元'}；建立時決定</div>

      <div class="label">資產負債表科目</div>
      <div class="input-cell">
        <select data-co="bs_classification" style="width:100%;">
          ${meta.bs_options.map(o => `<option ${o === co.bs_classification ? 'selected' : ''}>${o}</option>`).join('')}
        </select>
      </div>
      <div class="hint">${meta.bs_options.length > 1 ? '本類型有多個 BS 科目可選（例如流動 / 非流動）' : '本類型僅一個科目'}；要建立不同<u>投資類型</u>，請按左側「+ 新增被投資公司」</div>

      ${type === 'FVOCI' ? `
      <div class="label">FVOCI 工具種類</div>
      <div class="input-cell">
        <select data-co="fvoci_recycle">
          <option value="false" ${!co.fvoci_recycle ? 'selected' : ''}>股權工具（出售時 OCI 不轉列損益）</option>
          <option value="true" ${co.fvoci_recycle ? 'selected' : ''}>債權工具（出售時 OCI 轉列損益）</option>
        </select>
      </div>
      <div class="hint">影響出售時的處分損益計算</div>
      ` : ''}

      <div class="label">股利來源</div>
      <div class="input-cell">
        <select data-inv="dividend_source">
          <option value="DOMESTIC" ${co.dividend_source !== 'FOREIGN' ? 'selected' : ''}>國內（→ 58 欄不計入所得）</option>
          <option value="FOREIGN" ${co.dividend_source === 'FOREIGN' ? 'selected' : ''}>國外（應稅）</option>
        </select>
      </div>
      <div class="hint">國內公司所發股利（含現金、股票股利）為「不計入所得額之股利」，列於申報書 58 欄；國外股利則為應稅</div>

      <div class="label">處分性質</div>
      <div class="input-cell">
        <select data-inv="disposal_nature">
          <option value="SECURITIES" ${co.disposal_nature !== 'LAND' && co.disposal_nature !== 'OTHER' ? 'selected' : ''}>證券／期貨（→ 99 欄停徵）</option>
          <option value="LAND" ${co.disposal_nature === 'LAND' ? 'selected' : ''}>土地（→ 101 欄免徵）</option>
          <option value="OTHER" ${co.disposal_nature === 'OTHER' ? 'selected' : ''}>其他（應稅）</option>
        </select>
      </div>
      <div class="hint">影響處分損益歸到應免稅分攤表哪一欄；證券→ B 欄、土地→ C 欄、其他併入應稅</div>

      <div class="label">會計年度（民國）</div>
      <div class="input-cell">${numInput(co.year, 'data-co="year"')}</div>
      <div class="hint">可直接修改；變更後年度 tab 會自動重新排序</div>

      <div class="label">${fm.L_init_shares}</div>
      <div class="roll-cell">${numInput(co.init_shares, 'data-co="init_shares"')}</div>
      <div class="hint">上年度底稿期末${fm.L_shares}（拋轉時自動帶入）</div>

      <div class="label">${fm.L_init_total}</div>
      <div class="roll-cell">${numInput(co.init_total, 'data-co="init_total"')}</div>
      <div class="hint">${totalHint}</div>

      <div class="label">${fm.L_init_outstanding}</div>
      <div class="roll-cell">${numInput(co.init_outstanding || 0, 'data-co="init_outstanding"')}</div>
      <div class="hint">${outstandingHint}</div>

      <div class="label">期初被投資公司資本公積</div>
      <div class="roll-cell">${numInput(co.init_capital_reserve || 0, 'data-co="init_capital_reserve"')}</div>
      <div class="hint">被投資公司資本公積餘額（記錄用，影響資本公積轉增資的可分配額度）</div>

      <div class="label">期初${fm.L_holding_pct}</div>
      <div class="calc">${(() => { const out = (co.init_outstanding && co.init_outstanding > 0) ? co.init_outstanding : co.init_total; return out > 0 ? fmtPct(co.init_shares / out) : '—'; })()}</div>
      <div class="hint">＝ ${fm.L_init_shares} ÷ ${fm.L_init_outstanding}（若空則用${fm.L_init_total}）</div>

      <div class="label">${type === 'COST' ? '期初帳面值（成本）' : '期初投資帳面值（財）'}</div>
      <div class="roll-cell">${numInput(co.init_bv, 'data-co="init_bv"')}</div>
      <div class="hint">${bvHint}</div>

      <div class="label">期初投資原始成本（稅）</div>
      <div class="roll-cell">${numInput(co.init_cost, 'data-co="init_cost"')}</div>
      <div class="hint">歷次取得之投入金額累計</div>

      ${showOCI ? `
      <div class="label">期初其他權益累計（OCI）</div>
      <div class="roll-cell">${numInput(co.init_oci, 'data-co="init_oci"')}</div>
      <div class="hint">${ociHint}</div>
      ` : ''}
    </div>
  </div>`;
}

function renderSubInfo(co) {
  const type = co.type || 'EQUITY';
  const fm = formMeta(co.company_form);
  const isLimited = (co.company_form === 'LIMITED');
  const totalEndHint = isLimited
    ? '期末總資本額（元）'
    : '已發行股數（含庫藏股）；含本年度盈轉配股 / 資本公積轉增資 / 現增 / 減資後';
  const outstandingEndHint = isLimited
    ? '有限公司無庫藏股，通常等於總資本額'
    : '＝ 總發行 − 庫藏股；持股 % 計算分母（如無庫藏股可填等於總發行）';
  if (type === 'EQUITY') {
    return `
    <div class="sec" id="in_sub">
      <h2 class="sec-title">二、被投資公司本期數字</h2>
      <div class="note">來源：被投資公司會計師查核報告之損益表 / 綜合損益表 / 資產負債表 / 盈餘分配表</div>
      <div class="grid">
        <div class="label">子公司本年運作起始日</div>
        <div class="input-cell"><input type="text" data-co="sub_start_date" value="${co.sub_start_date || ''}" placeholder="空白 = 全年運作；若本年新設立填如 112.11.08" style="text-align:left" class="${co.sub_start_date && !parseTwDate(co.sub_start_date) ? 'date-invalid' : ''}"></div>
        <div class="hint">本年新設立或本年才開始運作之子公司：填運作起始日；認列損益會依運作天數攤分而非整年 ${totalDaysInYear(co.year)} 天</div>

        <div class="label">本期稅後淨利（NI）</div>
        <div class="input-cell">${numInput(co.sub_ni, 'data-co="sub_ni"')}</div>
        <div class="hint">子公司損益表「本期淨利」（若本年中設立則為運作期間之 NI）</div>

        <div class="label">本期其他綜合損益（OCI）</div>
        <div class="input-cell">${numInput(co.sub_oci, 'data-co="sub_oci"')}</div>
        <div class="hint">子公司綜合損益表 OCI 合計</div>

        <div class="label">期末權益總額</div>
        <div class="input-cell">${numInput(co.sub_eq_end, 'data-co="sub_eq_end"')}</div>
        <div class="hint">子公司期末資產負債表「權益總計」（已含${isLimited ? '出資額' : '股本'}、資本公積、保留盈餘、其他權益）</div>

        <div class="label">期末資本公積</div>
        <div class="input-cell">${numInput(co.sub_capital_reserve_end || 0, 'data-co="sub_capital_reserve_end"')}</div>
        <div class="hint">被投資公司期末資本公積餘額（影響資本公積轉增資的可分配額度）</div>

        <div class="label">${fm.L_sub_shares_end}</div>
        <div class="input-cell">${numInput(co.sub_shares_end, 'data-co="sub_shares_end"')}</div>
        <div class="hint">${totalEndHint}</div>

        <div class="label">${fm.L_sub_outstanding_end}</div>
        <div class="input-cell">${numInput(co.sub_outstanding_end || 0, 'data-co="sub_outstanding_end"')}</div>
        <div class="hint">${outstandingEndHint}</div>
      </div>
    </div>`;
  }
  if (type === 'FVPL' || type === 'FVOCI') {
    return `
    <div class="sec" id="in_sub">
      <h2 class="sec-title">二、年末公允價值與被投資公司${fm.L_shares}</h2>
      <div class="note">公允價值來源：上市櫃股票收盤價 × ${fm.L_shares} / 未上市估值報告 / 第三方估值報告等。</div>
      <div class="grid">
        <div class="label">年末公允價值（總額）</div>
        <div class="input-cell">${numInput(co.fair_value_end, 'data-co="fair_value_end"')}</div>
        <div class="hint">本年 12/31 該投資的公允價值；評價損益 = 此值 − 事件處理後 BV</div>

        <div class="label">${fm.L_sub_shares_end}</div>
        <div class="input-cell">${numInput(co.sub_shares_end, 'data-co="sub_shares_end"')}</div>
        <div class="hint">用於計算期末${fm.L_holding_pct}（顯示用，非必填）</div>
      </div>
    </div>`;
  }
  // COST
  return `
  <div class="sec" id="in_sub">
    <h2 class="sec-title">二、本期減損評估與被投資公司${fm.L_shares}</h2>
    <div class="note">成本法不評價，僅在有確定減損證據時認列減損。減損後不可回轉（IFRS 9）。</div>
    <div class="grid">
      <div class="label">本年度認列減損</div>
      <div class="input-cell">${numInput(co.impairment, 'data-co="impairment"')}</div>
      <div class="hint">無減損則填 0；減損會減少帳面值與原始成本</div>

      <div class="label">${fm.L_sub_shares_end}</div>
      <div class="input-cell">${numInput(co.sub_shares_end, 'data-co="sub_shares_end"')}</div>
      <div class="hint">用於計算期末${fm.L_holding_pct}（顯示用，非必填）</div>
    </div>
  </div>`;
}

function renderEventTable(co) {
  const fm = formMeta(co.company_form);
  const isLimited = (co.company_form === 'LIMITED');
  // 有限公司無「流通在外股數變動」概念（無庫藏股）
  const allTypes = ['設立', '出售', '現金增資認購', '股份受讓', '股份讓與', '受贈', '減資退現', '收現金股利', '盈餘轉增資', '資本公積轉增資', '流通在外股數變動', '資本公積變動'];
  const types = isLimited ? allTypes.filter(t => t !== '流通在外股數變動') : allTypes;
  const sharesColLabel = isLimited ? '出資額（元）' : '股數 / 配股股數';
  const priceColLabel = isLimited ? '單價（一般填 1）' : '每股價/面額';
  const headers = `
    <tr>
      <th style="width:110px">日期 (民國)</th>
      <th style="width:120px">類型</th>
      <th style="width:120px">${sharesColLabel}</th>
      <th style="width:110px">${priceColLabel}</th>
      <th style="width:110px">證交稅 / 手續費</th>
      <th style="width:130px">金額（自動）</th>
      <th style="width:120px">備註</th>
      <th style="width:50px"></th>
    </tr>`;
  const rows = (co.events || []).map((ev, idx) => {
    const subtotal = (ev.shares || 0) * (ev.price || 0);
    return `<tr data-evrow="${idx}">
      <td><input type="text" data-ev="${idx}" data-key="date" value="${ev.date || ''}" placeholder="${co.year}.07.01" style="text-align:left" class="${ev.date && !parseTwDate(ev.date) ? 'date-invalid' : ''}" title="可輸入 108.07.01、108-7-1、108/7/1、108年7月1日、2019/7/1（自動偵測民國/西元）"></td>
      <td><select data-ev="${idx}" data-key="type">${types.map(t => `<option ${t===ev.type?'selected':''}>${t}</option>`).join('')}</select></td>
      <td>${numInput(ev.shares || 0, `data-ev="${idx}" data-key="shares"`)}</td>
      <td>${numInput(ev.price || 0, `data-ev="${idx}" data-key="price"`)}</td>
      <td>${numInput(ev.tax || 0, `data-ev="${idx}" data-key="tax"`)}</td>
      <td class="num ev-amt">${(ev.type === '收現金股利' || ev.type === '資本公積變動') ? numInput(ev.amount || 0, `data-ev="${idx}" data-key="amount"`) : fmt(subtotal)}</td>
      <td><input type="text" data-ev="${idx}" data-key="note" value="${ev.note || ''}" style="text-align:left"></td>
      <td style="text-align:center"><button class="del" data-evdel="${idx}">×</button></td>
    </tr>`;
  }).join('');

  return `
  <div class="sec" id="in_events">
    <h2 class="sec-title">三、本年度股權變動 / 股利事件</h2>
    <div class="note" style="margin-bottom:6px;">
      <strong>日期欄位</strong>：可自由輸入任何常見格式（民國 <code>113.07.01</code> / <code>113-7-1</code> / <code>113/7/1</code> / <code>113年7月1日</code> 或西元 <code>2024/7/1</code>）；離開欄位後系統會自動轉成標準格式 <code>113.07.01</code>。無法解析會紅框警示，該事件不納入計算。
    </div>
    <details style="margin:6px 0;">
      <summary style="cursor:pointer;font-size:13px;color:var(--c-primary);padding:4px 0;font-weight:600;">▸ 12 種事件類型說明（點擊展開）</summary>
      <div class="note" style="margin-top:4px;">
        <strong>設立</strong>：被投資公司於本年度新成立、本公司於設立時投入出資。股數＝認購股數（有限公司填出資額）；單價＝每股認購價（有限公司填 1）；該事件日期自動視為「子公司運作起始日」，設立前的 NI/OCI 不分攤入本公司認列損益<br>
        <strong>出售</strong>：股數＝出售股數（正數）；單價＝每股賣價；證交稅／手續費另計<br>
        <strong>股份受讓</strong>：股數＝受讓股數；單價＝每股成交價（向被投資公司其他股東或外部投資人購入；過戶費／印花稅可填稅費欄）<br>
        <strong>股份讓與</strong>：股數＝轉讓股數；單價＝每股成交價（轉讓予被投資公司其他股東或外部投資人；證交稅依規定填入稅費欄）<br>
        <strong>現金增資認購</strong>：股數＝認購股數；單價＝認購價；手續費（如有）填稅費欄<br>
        <strong>受贈</strong>：股數＝受贈股數；單價＝時價（會計與稅務認列基礎）<br>
        <strong>減資退現</strong>：股數＝減資股數；單價＝每股退回現金<br>
        <strong>收現金股利</strong>：直接於「金額」欄填入總現金股利金額；股數／單價可留 0<br>
        <strong>盈餘轉增資</strong>：股數＝獲配股數；單價填面額 10；稅務原始成本將自動 +股數×10（按面額認列為股利收入，列 58 欄）<br>
        <strong>資本公積轉增資</strong>：股數＝獲配股數；單價填面額 10；<u>不</u>視為股利收入（不列 58 欄）；原始成本基本上不變（每股成本被稀釋）<br>
        <strong>流通在外股數變動</strong>：被投資公司「流通在外股數」變動（如<u>買回庫藏股</u>、註銷庫藏股、再發行）；股數欄填變動量（買回填負數、再發行填正數）；本公司持股不變但持股% 會因分母改變而變動<br>
        <strong>資本公積變動</strong>：被投資公司資本公積增減（如股票溢價發行、資本公積轉增資使其減少等）；金額欄填變動量（增加填正、減少填負）；EQUITY 類型自動產生長投帳面值調整分錄
      </div>
    </details>
    <table class="events">
      <thead>${headers}</thead>
      <tbody>${rows || '<tr><td colspan="8" style="text-align:center;color:#94a3b8;padding:20px">尚未新增任何事件</td></tr>'}</tbody>
    </table>
    <div style="margin-top:8px;">
      <button class="primary" id="add_event">＋ 新增事件</button>
    </div>
  </div>`;
}

function renderSegments(r) {
  if (!r) return '<div class="sec" id="out_segments"></div>';
  const type = r.co.type || 'EQUITY';
  // 非權益法：顯示「年度評價結算」而非時間段表
  if (type !== 'EQUITY') {
    return renderFairValueSettlement(r);
  }
  const fmtDate = d => d ? `${d.getFullYear()-1911}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}` : '—';
  const rows = r.segments.map((s, i) => {
    const isLast = (i === r.segments.length - 1);
    const displayEnd = isLast ? new Date(s.endDate.getTime() - 86400000) : s.endDate;
    let pillCls = 'y';
    if (s.event) {
      const t = s.event.type;
      if (t === '出售' || t === '股份讓與') pillCls = 'r';
      else if (t === '現金增資認購' || t === '股份受讓' || t === '受贈' || t === '設立') pillCls = 'b';
      else if (t === '收現金股利') pillCls = 'g';
    }
    const evDesc = s.event ? `<span class="pill ${pillCls}">${s.event.type}</span>` : '';
    return `<tr>
      <td>${i+1}</td>
      <td>${fmtDate(s.startDate)} ~ ${fmtDate(displayEnd)}</td>
      <td class="num">${fmt(s.days)}</td>
      <td class="num">${fmt(s.shares)}</td>
      <td class="num">${fmtPct(s.holdingPct)}</td>
      <td class="num">${fmt(s.segNIPortion)}</td>
      <td class="num">${fmt(s.recogNI)}</td>
      <td class="num">${fmt(s.recogOCI)}</td>
      <td>${evDesc}</td>
    </tr>`;
  }).join('');
  return `
  <div class="sec" id="out_segments">
    <h2 class="sec-title">四、時間段拆分明細（依事件日切段，C1 完整版方法）</h2>
    <table class="segs">
      <thead><tr>
        <th>段</th><th>起 ~ 迄</th><th>天數</th><th>段起始股數</th><th>段持股 %</th>
        <th>段 NI 份額</th><th>認列投資收益</th><th>認列 OCI</th><th>段末事件</th>
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot style="background:#f1f5f9;font-weight:600;">
        <tr>
          <td colspan="2">全年彙總</td>
          <td class="num">${fmt(r.totDays)}</td>
          <td class="num">—</td>
          <td class="num">${fmtPct(r.weightedPct)}</td>
          <td class="num">${fmt(r.co.sub_ni)}</td>
          <td class="num">${fmt(r.totalRecogNI)}</td>
          <td class="num">${fmt(r.totalRecogOCI)}</td>
          <td></td>
        </tr>
      </tfoot>
    </table>
    <div class="small" style="margin-top:6px;">
      ${r.niDenom < r.totDays
        ? `子公司於 ${fmtDate(r.subOpStart)} 起運作（運作期間 ${r.niDenom} 天，全年 ${r.totDays} 天）；NI/OCI 與加權持股 % 均以運作期間為分母，設立前段不分攤<br>
           認列投資收益 ＝ Σ（段 NI 份額 × 段持股 %） ＝ 子公司 NI × 運作期間加權持股 %（容許 ±1 元尾差）<br>
           段 NI 份額 ＝ 子公司 NI × (段天數 ∩ 運作期間) ÷ 運作期間 ${r.niDenom} 天`
        : `認列投資收益 ＝ Σ（段 NI 份額 × 段持股 %） ＝ 子公司 NI × 全年加權持股 %（容許 ±1 元尾差）<br>
           段 NI 份額 ＝ 子公司 NI × 段天數 ÷ 全年 ${r.totDays} 天`}
    </div>
  </div>`;
}

          <tr><td>③ 加：盈轉配股（按面額 ${fmt(r.totalStockDivAmount)}）</td><td class="num">${fmt(r.totalStockDivAmount)}</td></tr>
          <tr><td>④ 減：本年出售除列（按比例）</td><td class="num">${fmtSigned(-r.totalBVRemoved)}</td></tr>

      <table class="segs">
        <tbody>
          <tr><td>① 期初帳面值（＝期初公允價值）</td><td class="num">${fmt(co.init_bv)}</td></tr>
          <tr><td>② 加：本年新購（設立 / 現金增資 / 股份受讓 / 受贈）</td><td class="num">${fmt(r.totalBuyAmt)}</td></tr>
          <tr><td>③ 加：盈轉配股（按面額）</td><td class="num">${fmt(r.totalStockDivAmount)}</td></tr>
          <tr><td>④ 減：本年出售除列（按比例公允值）</td><td class="num">${fmtSigned(-r.totalBVRemoved)}</td></tr>
          <tr><td>⑤ 減：減資退現除列</td><td class="num">${fmtSigned(-r.totalReduceBV)}</td></tr>
          <tr><td>⑥ 事件後 BV（評價前）</td><td class="num">${fmt(r.bvBeforeReval)}</td></tr>
          <tr><td>⑦ 期末公允價值（使用者輸入）</td><td class="num">${fmt(r.fvEnd)}</td></tr>
          <tr style="background:${type === 'FVPL' ? '#dbeafe' : '#fef3c7'};font-weight:600;">
            <td>⑧ ${recogLabel} ＝ ⑦ − ⑥</td><td class="num">${fmtSigned(r.valGain)}</td>
          </tr>
          <tr style="background:#d1fae5;font-weight:600;"><td>⑨ 期末帳面值（＝期末公允價值）</td><td class="num">${fmt(r.endBV)}</td></tr>
          <tr><td>本年股利收入（直接認列損益）</td><td class="num">${fmt(r.totalCashDiv)}</td></tr>
          <tr><td>本年處分損益（財務面）</td><td class="num">${fmtSigned(r.totalGainFin)}</td></tr>
        </tbody>
      </table>
      <div class="small" style="margin-top:6px;">
        ${type === 'FVPL'
          ? '評價損益認列至「透過損益按公允價值衡量金融資產評價損益」（屬本期損益）。'
          : `評價損益認列至 OCI 累計（${co.fvoci_recycle ? '債權工具：出售時轉列損益' : '股權工具：出售時不轉列損益，僅結轉保留盈餘'}）。`
        }
      </div>
    </div>`;
}

  const isFV = (type === 'FVPL' || type === 'FVOCI');
  const isCost = (type === 'COST');
  return `
  <div class="sec" id="out_summary">
    <h2 class="sec-title">五、全年彙總</h2>
    <div class="grid">
      ${isEquity ? `
      <div class="label">全年加權平均持股比例</div>
      <div class="calc">${fmtPct(r.weightedPct)}</div>
      <div class="hint">＝ Σ（段持股 % × 段天數）÷ 全年天數</div>
      ` : ''}

      <div class="label">期末持股股數</div>
      <div class="calc">${fmt(r.endShares)}</div>
      <div class="hint">＝ 期初 + 各事件股數變動</div>

      <div class="label">期末持股比例</div>
      <div class="calc">${fmtPct(r.endPct)}</div>
      <div class="hint">＝ 期末持股股數 ÷ 子公司期末總股數</div>

      ${isEquity ? `
      <div class="label">認列權益法投資收益（財）</div>
      <div class="calc">${fmt(r.totalRecogNI)}</div>
      <div class="hint">時間段加權法</div>

      <div class="label">認列其他綜合損益（財）</div>

      <div class="hint">時間段加權法</div>

      ${isFV ? `
      <div class="label">公允價值評價損益（${type === 'FVPL' ? '當期損益' : 'OCI'}）</div>

      ` : ''}

      ${isCost ? `
      <div class="label">本年認列減損</div>
      <div class="calc">${fmtSigned(-r.impairment)}</div>
      <div class="hint">減少帳面值與原始成本</div>
      ` : ''}

      <div class="label">收到現金股利（總額）</div>
      <div class="calc">${fmt(r.totalCashDiv)}</div>
      <div class="hint">${isEquity ? '採權益法時不入損益，直接抵減投資帳面值' : '直接認列為股利收入（屬本期損益）'}</div>

      <div class="label">獲配股票股利股數</div>
      <div class="calc">${fmt(r.totalStockDivShares)}</div>
      <div class="hint">財報不入帳；稅務原始成本 +股數×10</div>

      <div class="label">處分損益 — 財務面（合計）</div>
      <div class="calc">${fmtSigned(r.totalGainFin)}</div>
      <div class="hint">出售價款 − 證交稅 − 帳面值除列${isEquity || (type==='FVOCI' && r.co.fvoci_recycle) ? ' ＋ 對應 OCI 重分類' : ''}</div>

      <div class="label">處分損益 — 稅務面（合計）</div>
      <div class="calc">${fmtSigned(r.totalGainTax)}</div>
      <div class="hint">出售價款 − 證交稅 − 原始成本除列</div>

      <div class="label">財稅差(處分)</div>
      <div class="calc">${fmtSigned(r.totalGainTax - r.totalGainFin)}</div>
      <div class="hint">＝ 稅務 − 財務（用於 E 表帳外調整）</div>
    </div>
  </div>`;
}

function renderJournalEntries(r) {
  if (!r) return '<div class="sec" id="out_entries"></div>';
  const co = r.co;
  const type = co.type || 'EQUITY';
  const subName = co.name || '被投資公司';
  const entries = [];
  // 投資科目名稱（依類型）
  const ACCT = {
    EQUITY: '採權益法之投資',
    FVPL:   '透過損益按公允價值衡量之金融資產',
    FVOCI:  '透過其他綜合損益按公允價值衡量之金融資產',
    COST:   '按成本衡量之金融資產',
  }[type];
  const investAcct = `${ACCT} — ${subName}`;

  // ① 認列權益法投資收益（僅 EQUITY）
  if (type === 'EQUITY' && r.totalRecogNI !== 0) {
    if (r.totalRecogNI >= 0) {
      entries.push({ head: `① 認列權益法投資收益（全年合計）`, rows: [
        ['Dr.', investAcct, r.totalRecogNI, ''],
        ['Cr.', '採權益法認列之關聯企業及合資損益 — 投資收益', '', r.totalRecogNI],
      ]});
    } else {
      entries.push({ head: `① 認列權益法投資損失（全年合計）`, rows: [
        ['Dr.', '採權益法認列之關聯企業及合資損益 — 投資損失', Math.abs(r.totalRecogNI), ''],
        ['Cr.', investAcct, '', Math.abs(r.totalRecogNI)],
      ]});
    }
  }

  // ② 認列權益法 OCI 份額（僅 EQUITY）
  if (type === 'EQUITY' && r.totalRecogOCI !== 0) {
    if (r.totalRecogOCI >= 0) {
      entries.push({ head: `② 認列其他綜合損益份額（全年合計）`, rows: [
        ['Dr.', investAcct, r.totalRecogOCI, ''],
        ['Cr.', '其他綜合損益 — 採權益法之投資公司未實現評價損益', '', r.totalRecogOCI],
      ]});
    } else {
      entries.push({ head: `② 認列其他綜合損益份額（全年合計）`, rows: [
        ['Dr.', '其他綜合損益 — 採權益法之投資公司未實現評價損益', Math.abs(r.totalRecogOCI), ''],
        ['Cr.', investAcct, '', Math.abs(r.totalRecogOCI)],
      ]});
    }
  }

  // ① FVPL/FVOCI 公允價值評價（年末）
  if ((type === 'FVPL' || type === 'FVOCI') && r.valGain !== 0) {
    const isPL = (type === 'FVPL');
    const ociAcct = '其他綜合損益 — FVOCI 金融資產未實現評價損益';
    const plAcct  = '透過損益按公允價值衡量金融資產 — 評價損益';
    if (r.valGain > 0) {
      entries.push({ head: `① 期末公允價值評價（${isPL ? '評價利益' : 'OCI 評價利益'}）`, rows: [
        ['Dr.', investAcct, r.valGain, ''],
        ['Cr.', isPL ? plAcct : ociAcct, '', r.valGain],
      ]});
    } else {
      entries.push({ head: `① 期末公允價值評價（${isPL ? '評價損失' : 'OCI 評價損失'}）`, rows: [
        ['Dr.', isPL ? plAcct : ociAcct, Math.abs(r.valGain), ''],
        ['Cr.', investAcct, '', Math.abs(r.valGain)],
      ]});
    }
  }

  // ① COST 減損認列
  if (type === 'COST' && r.impairment > 0) {
    entries.push({ head: `① 金融資產減損認列`, rows: [
      ['Dr.', '金融資產減損損失 — 按成本衡量金融資產', r.impairment, ''],
      ['Cr.', investAcct + '（累計減損）', '', r.impairment],
    ]});
  }

  // ③ 各事件分錄（依類型分流）
  const evList = (type === 'EQUITY')
    ? r.segments.filter(s => s.event).map(s => ({ event: s.event, evImpact: s.evImpact, endDate: s.endDate }))
    : (r.eventImpacts || []).map(x => ({ event: x.event, evImpact: x.impact, endDate: parseTwDate(x.event.date) }));

  evList.forEach(({ event: ev, evImpact: im, endDate }) => {
    const dateStr = endDate ? `${endDate.getFullYear()-1911}.${String(endDate.getMonth()+1).padStart(2,'0')}.${String(endDate.getDate()).padStart(2,'0')}` : '';

    switch (ev.type) {
      case '出售': {
        const r1 = [
          ['Dr.', '銀行存款（出售淨額）', im.proceeds - im.tax, ''],
          ['Cr.', investAcct + '（按比例除列）', '', im.bvRemoved],
        ];
        const dispGain = im.proceeds - im.tax - im.bvRemoved;
        if (dispGain >= 0) r1.push(['Cr.', '處分投資利益 — 採權益法之投資', '', dispGain]);
        else r1.splice(1, 0, ['Dr.', '處分投資損失 — 採權益法之投資', Math.abs(dispGain), '']);
        entries.push({ head: `③ 出售（${dateStr}）${fmt(im.saleShares)} 股 @ ${fmt(ev.price)} 元`, rows: r1 });
        if (im.ociRemoved !== 0) {
          if (im.ociRemoved > 0) {
            entries.push({ head: `　　└─ OCI 重分類至損益（出售比例 ${(im.ratio*100).toFixed(2)}%）`, rows: [
              ['Dr.', '其他綜合損益 — 採權益法之投資公司未實現評價損益', im.ociRemoved, ''],
              ['Cr.', '處分投資利益 — 採權益法之投資（OCI 重分類）', '', im.ociRemoved],
            ]});
          } else {
            entries.push({ head: `　　└─ OCI 重分類至損益（出售比例 ${(im.ratio*100).toFixed(2)}%）`, rows: [
              ['Dr.', '處分投資損失 — 採權益法之投資（OCI 重分類）', Math.abs(im.ociRemoved), ''],
              ['Cr.', '其他綜合損益 — 採權益法之投資公司未實現評價損益', '', Math.abs(im.ociRemoved)],
            ]});
          }
        }
        break;
      }
      case '設立': {
        entries.push({ head: `③ 設立認股（${dateStr}）認購 ${fmt(im.buyShares)} 股 @ ${fmt(ev.price)} 元（被投資公司本日成立，本公司於設立時投入出資）`, rows: [
          ['Dr.', investAcct, im.amount, ''],
          ['Cr.', '銀行存款', '', im.amount + (im.tax || 0)],
          ...(im.tax ? [['Dr.', '規費 / 設立費用（如有）', im.tax, '']] : []),
        ]});
        break;
      }
      case '現金增資認購': {
        entries.push({ head: `③ 現金增資認購（${dateStr}）${fmt(im.buyShares)} 股 @ ${fmt(ev.price)} 元`, rows: [
          ['Dr.', investAcct, im.amount, ''],
          ['Cr.', '銀行存款', '', im.amount + (im.tax || 0)],
          ...(im.tax ? [['Dr.', '手續費（如有）', im.tax, '']] : []),
        ]});
        break;
      }
      case '受贈': {
        entries.push({ head: `③ 受贈（${dateStr}）${fmt(im.buyShares)} 股 @ 時價 ${fmt(ev.price)} 元`, rows: [
          ['Dr.', investAcct, im.amount, ''],
          ['Cr.', '受贈收入 / 業外收入', '', im.amount],
        ]});
        break;
      }
      case '減資退現': {
        entries.push({ head: `③ 減資退現（${dateStr}）減少 ${fmt(im.reduceShares)} 股，每股退回 ${fmt(ev.price)} 元`, rows: [
          ['Dr.', '銀行存款', im.cashBack, ''],
          ['Cr.', investAcct + '（按比例除列）', '', im.bvReduced],
          ...(im.cashBack !== im.bvReduced ? [
            im.cashBack > im.bvReduced
              ? ['Cr.', '處分投資利益', '', im.cashBack - im.bvReduced]
              : ['Dr.', '處分投資損失', im.bvReduced - im.cashBack, '']
          ] : []),
        ]});
        break;
      }
      case '收現金股利': {
        if (type === 'EQUITY') {
          entries.push({ head: `③ 收現金股利（${dateStr}）`, rows: [
            ['Dr.', '銀行存款', im.divAmt, ''],
            ['Cr.', investAcct + '（抵減投資帳面值）', '', im.divAmt],
          ]});
        } else {
          entries.push({ head: `③ 收現金股利（${dateStr}）`, rows: [
            ['Dr.', '銀行存款', im.divAmt, ''],
            ['Cr.', '股利收入', '', im.divAmt],
          ]});
        }
        break;
      }
      case '盈餘轉增資': {
        entries.push({ head: `③ 盈餘轉增資配股（${dateStr}）獲配 ${fmt(im.stockShares)} 股`, rows: [
          ['', '財務會計：不作分錄（僅備忘股數變動）', '', ''],
          ['', '稅務原始成本：+ ' + fmt(im.stockDivAmount) + ' 元（按面額認列為股利收入，列 58 欄）', '', ''],
        ]});
        break;
      }
      case '資本公積轉增資': {
        entries.push({ head: `③ 資本公積轉增資配股（${dateStr}）獲配 ${fmt(im.capitalRsvShares)} 股`, rows: [
          ['', '財務會計：不作分錄（僅備忘股數變動）', '', ''],
          ['', '稅務原始成本：不變（每股成本被稀釋；不認列為股利收入，<u>不</u>列 58 欄）', '', ''],
        ]});
        break;
      }
      case '流通在外股數變動': {
        const lbl = im.outstandingDelta > 0 ? '增加' : '減少';
        entries.push({ head: `③ 被投資公司流通在外股數${lbl}（${dateStr}）${fmtSigned(im.outstandingDelta)} 股${ev.note ? '（' + ev.note + '）' : ''}`, rows: [
          ['', `本公司不作分錄（為被投資公司端事件）；持股 % 計算分母自此事件起改變`, '', ''],
          ...(im.totalDelta ? [['', `總發行股數 ${im.totalDelta > 0 ? '增加' : '減少'} ${fmtSigned(im.totalDelta)}（如註銷庫藏股）`, '', '']] : []),
        ]});
        break;
      }
      case '資本公積變動': {
        if (type === 'EQUITY' && im.parentShare && im.parentShare !== 0) {
          const isPos = im.parentShare > 0;
          const rsvAcct = '資本公積 — 採權益法認列之關聯企業及合資股權變動之影響';
          entries.push({ head: `③ 被投資公司資本公積變動（${dateStr}）${fmtSigned(im.capitalRsvDelta)} 元 — 本公司應認列份額 ${fmtSigned(im.parentShare)}${ev.note ? '（' + ev.note + '）' : ''}`, rows: isPos ? [
            ['Dr.', investAcct, im.parentShare, ''],
            ['Cr.', rsvAcct, '', im.parentShare],
          ] : [
            ['Dr.', rsvAcct, Math.abs(im.parentShare), ''],
            ['Cr.', investAcct, '', Math.abs(im.parentShare)],
          ]});
        } else {
          entries.push({ head: `③ 被投資公司資本公積變動（${dateStr}）${fmtSigned(im.capitalRsvDelta)} 元${ev.note ? '（' + ev.note + '）' : ''}`, rows: [
            ['', `${type === 'EQUITY' ? '本公司無持股或計算為 0，不需分錄' : '本公司不作分錄（' + (TYPE_META[type]||{}).short + ' 已透過公允價值/成本反映，或不適用）'}；僅備忘子公司資本公積餘額`, '', ''],
          ]});
        }
        break;
      }
      case '股份受讓': {
        entries.push({ head: `③ 股份受讓（${dateStr}）${fmt(im.buyShares)} 股 @ ${fmt(ev.price)} 元（向其他股東或外部投資人購入）`, rows: [
          ['Dr.', investAcct, im.amount, ''],
          ['Cr.', '銀行存款（支付予出讓方）', '', im.amount + (im.tax || 0)],
          ...(im.tax ? [['Dr.', '證交稅 / 印花稅 / 過戶費（如有）', im.tax, '']] : []),
        ]});
        break;
      }
      case '股份讓與': {
        const r2 = [
          ['Dr.', '銀行存款（轉讓淨額）', im.proceeds - im.tax, ''],
          ['Cr.', investAcct + '（按比例除列）', '', im.bvRemoved],
        ];
        const dispGain2 = im.proceeds - im.tax - im.bvRemoved;
        if (dispGain2 >= 0) r2.push(['Cr.', '處分投資利益 — 採權益法之投資', '', dispGain2]);
        else r2.splice(1, 0, ['Dr.', '處分投資損失 — 採權益法之投資', Math.abs(dispGain2), '']);
        entries.push({ head: `③ 股份讓與（${dateStr}）${fmt(im.saleShares)} 股 @ ${fmt(ev.price)} 元（轉讓予其他股東或外部投資人）`, rows: r2 });
        if (im.ociRemoved !== 0) {
          if (im.ociRemoved > 0) {
            entries.push({ head: `　　└─ OCI 重分類至損益（轉讓比例 ${(im.ratio*100).toFixed(2)}%）`, rows: [
              ['Dr.', '其他綜合損益 — 採權益法之投資公司未實現評價損益', im.ociRemoved, ''],
              ['Cr.', '處分投資利益 — 採權益法之投資（OCI 重分類）', '', im.ociRemoved],
            ]});
          } else {
            entries.push({ head: `　　└─ OCI 重分類至損益（轉讓比例 ${(im.ratio*100).toFixed(2)}%）`, rows: [
              ['Dr.', '處分投資損失 — 採權益法之投資（OCI 重分類）', Math.abs(im.ociRemoved), ''],
              ['Cr.', '其他綜合損益 — 採權益法之投資公司未實現評價損益', '', Math.abs(im.ociRemoved)],
            ]});
          }
        }
        break;
      }
    }
  });

  if (entries.length === 0) {
    return `<div class="sec" id="out_entries">
      <h2 class="sec-title">六、應做之會計分錄</h2>
      <div class="small">尚無分錄需求（請先填入子公司本期 NI/OCI 或新增事件）</div>
    </div>`;
  }

  const html = entries.map(e => `<div class="entry">
    <div class="ehead">${e.head}</div>
    <table>${e.rows.map(([dc, acct, dr, cr]) => `
      <tr>
        <td style="width:30px">${dc}</td>
        <td class="acct ${dc==='Cr.'?'cr':''}">${acct}</td>
        <td class="amt">${dr === '' ? '' : (typeof dr === 'number' ? fmt(dr) : dr)}</td>
        <td class="amt">${cr === '' ? '' : (typeof cr === 'number' ? fmt(cr) : cr)}</td>
      </tr>`).join('')}</table>
  </div>`).join('');

  return `
  <div class="sec" id="out_entries">
    <h2 class="sec-title">六、應做之會計分錄</h2>
    <div class="note">以下為帳上應做之分錄。① ② 為全年合計（年底沖銷）；③ 系列為各事件當日分錄。</div>
    ${html}
  </div>`;
}

function renderTaxOutput(r) {
  if (!r) return '<div class="sec" id="out_tax"></div>';
  const type = r.co.type || 'EQUITY';
  const col99 = r.totalGainTax;
  const col58 = r.totalCashDiv + r.totalStockDivAmount;
  const adjDispDiff = r.totalGainTax - r.totalGainFin;

  // 各類型帳外調整
  const rows = [];
  if (type === 'EQUITY') {
    if (r.totalRecogNI !== 0) {
      rows.push(`<tr><td>採權益法投資收益（剔除）</td><td>財報認列 ${fmt(r.totalRecogNI)}，稅務不認 → 全額帳外剔除</td><td class="num">${fmtSigned(-r.totalRecogNI)}</td></tr>`);
    }
  } else {
    if (r.totalCashDiv > 0) {
      rows.push(`<tr><td>現金股利收入（剔除）</td><td>${type === 'COST' ? '成本法' : '公允價值法'}下股利已入損益 ${fmt(r.totalCashDiv)}，稅務不計入所得 → 帳外剔除（再由 58 欄列示）</td><td class="num">${fmtSigned(-r.totalCashDiv)}</td></tr>`);
    }
    if (type === 'FVPL' && r.valGainPL !== 0) {
      rows.push(`<tr><td>FVPL 評價損益（剔除）</td><td>財報認列 ${fmtSigned(r.valGainPL)}（評價未實現），稅務不認 → 帳外剔除</td><td class="num">${fmtSigned(-r.valGainPL)}</td></tr>`);
    }
    if (type === 'COST' && r.impairment > 0) {
      rows.push(`<tr><td>金融資產減損損失（剔除）</td><td>財報認列 ${fmt(r.impairment)}，稅務不認（除非有確定處分） → 帳外剔除</td><td class="num">${fmtSigned(r.impairment)}</td></tr>`);
    }
  }
  if (r.sales.length > 0) {
    rows.push(`<tr><td>處分長投損益（財稅差）</td><td>財報 ${fmtSigned(r.totalGainFin)} 改為稅務 ${fmtSigned(r.totalGainTax)}（再由 99 欄列為免稅）</td><td class="num">${fmtSigned(adjDispDiff)}</td></tr>`);
  }
  if (r.totalStockDivAmount > 0) {
    rows.push(`<tr><td>盈轉配股（稅務認列）</td><td>財報不入帳；稅務按面額認列為股利收入後列 58 欄</td><td class="num">${fmtSigned(r.totalStockDivAmount)}</td></tr>`);
  }

  return `
  <div class="sec" id="out_tax">
    <h2 class="sec-title">七、報稅輸出 — 應免稅分攤表 / E 表帳外調整</h2>
    <h3 style="font-size:14px;margin:12px 0 6px;">A. 應免稅分攤表填報數</h3>
    <div class="grid">
      <div class="label">99 欄：停徵之證交（期交）所得</div>
      <div class="out">${fmtSigned(col99)}</div>
      <div class="hint">＝ 處分損益（稅務面）；填至應免稅分攤表 B 欄（免稅收入）</div>

      <div class="label">58 欄：不計入所得額之股利</div>
      <div class="out">${fmtSigned(col58)}</div>
      <div class="hint">＝ 現金股利 ${fmt(r.totalCashDiv)} ＋ 股票股利按面額 ${fmt(r.totalStockDivAmount)}；填至 D / F 欄</div>
    </div>
    <h3 style="font-size:14px;margin:16px 0 6px;">B. E 表帳外調整（財報 → 申報數）</h3>
    <table class="entries">
      <thead><tr><th style="width:280px">調整項目</th><th>科目 / 說明</th><th style="width:140px" class="num">調整數</th></tr></thead>
      <tbody>
        ${rows.length ? rows.join('') : '<tr><td colspan="3" style="text-align:center;color:#94a3b8;">無需調整</td></tr>'}
      </tbody>
    </table>
    <div class="note" style="margin-top:10px;">
      <strong>承辦操作：</strong> 將上表「調整數」填入 E 表「帳外剔除」欄；99/58 欄填入應免稅分攤表；F 表全年所得額減 99 欄 + 58 欄後得課稅所得額。
    </div>
  </div>`;
}

                : type === 'FVPL' ? '＝ 期末公允價值'

  <div class="sec" id="out_endcarry">

      ` : ''}

      <div class="label">期末持股比例</div>
      <div class="end-cell">${fmtPct(r.endPct)}</div>
      <div class="hint">＝ 期末股數 ÷ 子公司期末總股數</div>
    </div>
    <div style="margin-top:14px; padding-top:12px; border-top:1px dashed var(--c-border); display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      ${nextExists

        : `<button class="primary" id="carry_forward_btn">⇒ 拋轉並建立 ${nextY} 年度</button>
           <span class="small">將上方期末股數 / 帳面值 / 原始成本 / OCI 自動帶入新年度的「期初承轉」欄位</span>`
      }

function renderChecks(r) {
  if (!r) return '<div class="sec" id="out_checks"></div>';
  const type = r.co.type || 'EQUITY';
  const checks = [];

  if (type === 'EQUITY') {
    const expectedNI = Math.round(r.co.sub_ni * r.weightedPct);
    const niDiff = r.totalRecogNI - expectedNI;
    checks.push({
      ok: Math.abs(niDiff) <= Math.max(Math.abs(expectedNI) * 0.001, 10),
      msg: `<strong>① 認列投資收益勾稽</strong>：時間段加總 ${fmt(r.totalRecogNI)}　vs.　NI ${fmt(r.co.sub_ni)} × 加權 ${fmtPct(r.weightedPct)} ＝ ${fmt(expectedNI)}　差額 ${fmtSigned(niDiff)}`
    });
    checks.push({
      ok: Math.abs(r.bvDiff) < r.bvTol,
      msg: `<strong>② 期末帳面值勾稽</strong>：${fmt(r.endBV)}　vs.　${fmt(r.co.sub_eq_end)} × ${fmtPct(r.endPct)} ＝ ${fmt(r.expectedEndBV)}　差額 ${fmtSigned(r.bvDiff)}`
    });
  } else if (type === 'FVPL' || type === 'FVOCI') {
    checks.push({
      ok: Math.abs(r.endBV - r.fvEnd) < 1,
      msg: `<strong>① 期末帳面值勾稽</strong>：期末 BV ${fmt(r.endBV)} ＝ 期末公允價值 ${fmt(r.fvEnd)}（公允價值法應相等）`
    });
    checks.push({
      ok: true,
      msg: `<strong>② 評價損益勾稽</strong>：${fmtSigned(r.valGain)} ＝ 期末公允價值 ${fmt(r.fvEnd)} − 事件處理後 BV ${fmt(r.bvBeforeReval)}（${type === 'FVPL' ? '入當期損益' : '入 OCI 累計'}）`
    });
  } else if (type === 'COST') {
    checks.push({
      ok: Math.abs(r.endBV - r.endCost) < 1,
      msg: `<strong>① 期末帳面值勾稽</strong>：期末 BV ${fmt(r.endBV)} ＝ 期末成本 ${fmt(r.endCost)}（成本法應相等）`
    });
  }

  if (r.sales.length > 0) {
    checks.push({ ok: true,
      msg: `<strong>③ 99 欄勾稽</strong>：${fmt(r.totalGainTax)} ＝ 出售價款 ${fmt(r.totalSaleProceeds)} − 證交稅 ${fmt(r.totalSaleTax)} − 原始成本除列 ${fmt(r.totalCostRemoved)}`});
  } else {
    checks.push({ ok: true, msg: `<strong>③ 99 欄勾稽</strong>：本年度無出售，99 欄為 0` });
  }

  // 期末股數勾稽（共用）
  const evList = (type === 'EQUITY') ? r.segments.filter(s => s.event) : (r.eventImpacts || []);
  const eventShareDelta = evList.reduce((s, x) => {
    const ev = x.event || (x && x.event);
    const im = x.evImpact || x.impact || {};
    if (!ev) return s;
    if (ev.type === '出售' || ev.type === '股份讓與') return s - (im.saleShares || 0);
    if (ev.type === '減資退現') return s - (im.reduceShares || 0);
    if (ev.type === '現金增資認購' || ev.type === '受贈' || ev.type === '股份受讓' || ev.type === '設立') return s + (im.buyShares || 0);
    if (ev.type === '盈餘轉增資') return s + (im.stockShares || 0);
    if (ev.type === '資本公積轉增資') return s + (im.capitalRsvShares || 0);
    // 流通在外股數變動、資本公積變動：不影響本公司持股
    return s;
  }, 0);
  const expectedEndShares = r.co.init_shares + eventShareDelta;
  checks.push({
    ok: Math.abs(r.endShares - expectedEndShares) < 1,
    msg: `<strong>④ 期末股數勾稽</strong>：期末 ${fmt(r.endShares)} ＝ 期初 ${fmt(r.co.init_shares)} ${eventShareDelta>=0?'＋':'−'} 事件變動 ${fmt(Math.abs(eventShareDelta))}`
  });
  return `
  <div class="sec" id="out_checks" style="background:var(--c-check)">
    <h2 class="sec-title">九、勾稽（全綠才可結案）</h2>
    ${checks.map(c => `<div class="checkrow"><span class="led ${c.ok?'green':'red'}"></span><div>${c.msg}</div></div>`).join('')}
  </div>`;
}

function recomputeOutputs() {
  const inv = curInvestee();
  const yr = curYear();
  if (!inv || !yr) return;
  const co = { ...yr, name: inv.name, type: inv.type, bs_classification: inv.bs_classification, fvoci_recycle: inv.fvoci_recycle, company_form: inv.company_form };
  const r = compute(co);
  const replace = (id, html) => {
    const el = document.getElementById(id);
    if (el) el.outerHTML = html;
  };
  replace('out_segments', renderSegments(r));
  replace('out_summary',  renderSummary(r));
  replace('out_entries',  renderJournalEntries(r));
  replace('out_tax',      renderTaxOutput(r));
  replace('out_endcarry', renderEndCarry(r));
  replace('out_checks',   renderChecks(r));

  const initPctCell = document.querySelector('#in_basic .grid .calc');
  if (initPctCell) {
    initPctCell.textContent = yr.init_total > 0 ? fmtPct(yr.init_shares / yr.init_total) : '—';
  }
}

// ============================================================
// 事件綁定
// ============================================================
function bindMainEvents() {
  document.querySelectorAll('input[data-co], select[data-co]').forEach(el => {
    el.addEventListener('input', e => {
      const inv = curInvestee();
      const yr = curYear();
      if (!inv || !yr) return;
      const key = e.target.dataset.co;
      // year 改在 blur 才處理，避免使用者打字過程中年度被破壞
      if (key === 'year') return;

      const v = NUMERIC_CO_KEYS.includes(key) ? parseNum(e.target.value) : e.target.value;
      if (key === 'name') {
        inv.name = v;
        renderInvesteeList();
        const ptEl = document.getElementById('pt_investee');
        if (ptEl) ptEl.textContent = v || '（未命名）';
      } else if (key === 'bs_classification') {
        inv.bs_classification = v;
      } else if (key === 'fvoci_recycle') {
        inv.fvoci_recycle = (v === 'true' || v === true);
      } else {
        yr[key] = v;
      }
      save();
      if (NUMERIC_CO_KEYS.includes(key)) {
        e.target.classList.toggle('numeric-neg', v < 0);
      }
      // sub_start_date 即時驗證
      if (key === 'sub_start_date') {
        const valid = !v || parseTwDate(v);
        e.target.classList.toggle('date-invalid', !valid);
      }
      recomputeOutputs();
    });
    el.addEventListener('blur', e => {
      const inv = curInvestee();
      const yr = curYear();
      if (!inv || !yr) return;
      const key = e.target.dataset.co;

      // sub_start_date 標準化
      if (key === 'sub_start_date') {
        const raw = yr.sub_start_date || '';
        if (raw && parseTwDate(raw)) {
          const norm = normalizeTwDate(raw);
          if (norm !== raw) {
            yr.sub_start_date = norm;
            e.target.value = norm;
            e.target.classList.remove('date-invalid');
            save();
            recomputeOutputs();
          }
        }
        return;
      }

      if (key === 'year') {
        const newY = parseNum(e.target.value);
        if (!isFinite(newY) || newY < 1 || newY > 999) {
          e.target.value = fmtInput(yr.year);
          return;
        }
        if (newY === yr.year) {
          e.target.value = fmtInput(yr.year);
          return;
        }
        if (inv.years.some(y => y !== yr && y.year === newY)) {
          alert(`${newY} 年度已存在，請選其他年度`);
          e.target.value = fmtInput(yr.year);
          return;
        }
        yr.year = newY;
        state.current_year = newY;
        inv.years.sort((a, b) => a.year - b.year);
        save();
        renderMain();
        return;
      }

      if (NUMERIC_CO_KEYS.includes(key)) {
        e.target.value = fmtInput(yr[key]);
      }
    });
  });

  // investee 層級欄位（dividend_source / disposal_nature 等）
  document.querySelectorAll('select[data-inv]').forEach(el => {
    el.addEventListener('input', e => {
      const inv = curInvestee();
      if (!inv) return;
      const key = e.target.dataset.inv;
      inv[key] = e.target.value;
      save();
      recomputeOutputs();
    });
  });

  document.querySelectorAll('input[data-ev], select[data-ev]').forEach(el => {
    el.addEventListener('input', e => {
      const yr = curYear();
      if (!yr) return;
      const idx = +e.target.dataset.ev;
      const key = e.target.dataset.key;
      let v;
      if (e.target.tagName === 'SELECT' || !NUMERIC_EV_KEYS.includes(key)) v = e.target.value;
      else v = parseNum(e.target.value);
      yr.events[idx][key] = v;
      save();
      if (NUMERIC_EV_KEYS.includes(key)) {
        e.target.classList.toggle('numeric-neg', v < 0);
      }
      if (key === 'date') {
        const valid = !v || parseTwDate(v);
        e.target.classList.toggle('date-invalid', !valid);
      }
      if (key === 'type') {
        renderMain();
      } else {
        if ((key === 'shares' || key === 'price') && yr.events[idx].type !== '收現金股利' && yr.events[idx].type !== '資本公積變動') {
          const row = e.target.closest('tr');
          if (row) {
            const amtCell = row.querySelector('td.ev-amt');
            if (amtCell) amtCell.innerHTML = fmt((yr.events[idx].shares || 0) * (yr.events[idx].price || 0));
          }
        }
        recomputeOutputs();
      }
    });
    el.addEventListener('blur', e => {
      const yr = curYear();
      if (!yr) return;
      const idx = +e.target.dataset.ev;
      const key = e.target.dataset.key;
      if (!yr.events[idx]) return;
      if (NUMERIC_EV_KEYS.includes(key)) {
        e.target.value = fmtInput(yr.events[idx][key]);
      } else if (key === 'date') {
        // 自動標準化日期格式為「民國.月.日」
        const raw = yr.events[idx].date;
        const normalized = normalizeTwDate(raw);
        if (normalized !== raw && parseTwDate(raw)) {
          yr.events[idx].date = normalized;
          e.target.value = normalized;
          e.target.classList.remove('date-invalid');
          save();
          recomputeOutputs();
        }
      }
    });
  });

  document.querySelectorAll('button[data-evdel]').forEach(b => {
    b.addEventListener('click', () => {
      const yr = curYear();
      yr.events.splice(+b.dataset.evdel, 1);
      save();
      renderMain();
    });
  });

  document.getElementById('add_event')?.addEventListener('click', () => {
    const yr = curYear();
    yr.events.push({date: '', type: '出售', shares: 0, price: 0, tax: 0, amount: 0, note: ''});
    save();
    renderMain();
  });

  // 拋轉至下年度
  document.getElementById('carry_forward_btn')?.addEventListener('click', () => {
    const yr = curYear();
    if (!yr) return;
    addYear(yr.year + 1);
  });
  document.getElementById('goto_next_year')?.addEventListener('click', e => {
    e.preventDefault();
    const yr = curYear();
    if (!yr) return;
    state.current_year = yr.year + 1;
    save();
    renderMain();
  });

  // 歷年表「年度」欄位點擊跳轉
  document.querySelectorAll('[data-goto]').forEach(td => {
    td.addEventListener('click', () => {
      state.current_year = parseInt(td.dataset.goto);
      state.view_mode = 'detail';
      save();
      renderMain();
    });
  });
}

// ============================================================
// 新增 / 拋轉
// ============================================================
function addInvestee() {
  // 1. 輸入名稱
  const name = prompt('請輸入被投資公司名稱', '新被投資公司');
  if (name === null) return;
  // 2. 公司形態（依名稱猜測預設）
  const guessLimited = /有限公司$/.test(String(name).trim()) && !/股份有限公司$/.test(String(name).trim());
  const formPrompt = '請選擇公司形態（輸入數字）：\n  1. 股份有限公司 — 以「股」計量，面額 10 元\n  2. 有限公司 — 以「出資額（元）」計量，無股票概念';
  const formInput = prompt(formPrompt, guessLimited ? '2' : '1');
  if (formInput === null) return;
  const formIdx = parseInt(String(formInput).trim());
  const formMap = { 1: 'STOCK', 2: 'LIMITED' };
  const company_form = formMap[formIdx];
  if (!company_form) { alert('請輸入 1 或 2'); return; }
  // 3. 選擇投資類型
  const typePrompt = '請選擇投資類型（輸入數字）：\n  1. 採權益法之投資 (EQUITY) — 對被投資公司具重大影響力\n  2. 透過損益按公允價值衡量 (FVPL) — 短期持有交易目的\n  3. 透過 OCI 按公允價值衡量 (FVOCI) — 長期持有股權／債權\n  4. 按成本衡量 (COST) — 無公開報價之未上市股票';
  const typeInput = prompt(typePrompt, '1');
  if (typeInput === null) return;
  const typeIdx = parseInt(String(typeInput).trim());
  const typeMap = { 1: 'EQUITY', 2: 'FVPL', 3: 'FVOCI', 4: 'COST' };
  const type = typeMap[typeIdx];
  if (!type) { alert('請輸入 1–4'); return; }
  // 4. 起始年度
  const yearInput = prompt(`請輸入「起始年度」（民國年）。\n從這個年度開始建立 ${name} 的持股紀錄，後續可依序拋轉至下年度。`, 110);
  if (yearInput === null) return;
  const startY = parseInt(String(yearInput).trim());
  if (!isFinite(startY) || startY < 1) { alert('請輸入有效年度'); return; }

  const inv = newInvestee(name.trim() || '新被投資公司', startY, type, null, false, company_form);
  state.investees.push(inv);
  state.current_investee_id = inv.id;
  state.current_year = startY;
  state.view_mode = 'detail';
  save();
  renderAll();
}

              ] },

function addYear(autoYear) {
  const inv = curInvestee();
  if (!inv) return;
  const existingYears = inv.years.map(y => y.year);
  let newY;
  if (autoYear !== undefined) {
    newY = autoYear;
  } else {
    const defaultY = existingYears.length > 0 ? Math.max(...existingYears) + 1 : 110;
    const input = prompt(`請輸入新年度（民國年）。\n例如要新增過去年度，可直接輸入該年（如 109、110）。`, defaultY);
    if (input === null) return; // 取消
    const trimmed = String(input).trim();
    if (trimmed === '') return; // 空白靜默忽略
    newY = parseInt(trimmed);
    if (!isFinite(newY) || newY < 1) {
      alert('請輸入有效的民國年度數字（例如 110、113）');
      return;
    }
  }
  if (existingYears.includes(newY)) { alert(`${newY} 年度已存在`); return; }

  const yObj = newYear(newY);

  // 從上一年（newY - 1）拋轉期末值
  const prevY = inv.years.find(y => y.year === newY - 1);
  if (prevY) {
    const co = { ...prevY, name: inv.name, type: inv.type, bs_classification: inv.bs_classification, fvoci_recycle: inv.fvoci_recycle, company_form: inv.company_form };
    const r = compute(co);
    if (r) {
      yObj.init_shares = r.endShares;
      yObj.init_total = prevY.sub_shares_end || prevY.init_total;
      yObj.init_bv = r.endBV;
      yObj.init_cost = r.endCost;
      yObj.init_oci = r.endOCI;
    }
  }

  inv.years.push(yObj);
  inv.years.sort((a, b) => a.year - b.year);
  state.current_year = newY;
  state.view_mode = 'detail';
  save();
  renderMain();
}

document.getElementById('export_btn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `權益法計算_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
});
document.getElementById('import_btn').addEventListener('click', () => {
  document.getElementById('import_file').click();
});
document.getElementById('import_file').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      // 支援 v2 / v3 格式
      if (imported.companies && !imported.investees) {
        state = migrateV2(imported);
      } else {
        state = imported;
        if (!state.view_mode) state.view_mode = 'detail';
      }
      save();
      renderAll();
    } catch (err) { alert('匯入失敗：' + err.message); }
  };
  reader.readAsText(file);
});
